name: Bug report
description: Reporte um problema que afeta o funcionamento do projeto
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por relatar o problema. Preencha as informações abaixo para facilitar a análise.
  - type: textarea
    id: summary
    attributes:
      label: Resumo
      description: Explique o problema de forma direta.
      placeholder: O que aconteceu?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      description: Liste os passos para reproduzir o problema.
      placeholder: |
        1. Abra...
        2. Clique em...
        3. Veja o erro...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
      placeholder: O que deveria acontecer?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidências
      description: Adicione prints, vídeos, logs ou contexto relevante.
  - type: dropdown
    id: device
    attributes:
      label: Ambiente
      options:
        - Desktop
        - Mobile
        - Tablet
        - Não se aplica
    validations:
      required: true
